<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能催收对话系统 - Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 700px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #f8fafc;
        }

        .message {
            display: flex;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.agent {
            justify-content: flex-start;
        }

        .message.customer {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
        }

        .message.agent .message-content {
            background: white;
            color: #1e293b;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .message.customer .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
            text-align: right;
        }

        .input-area {
            padding: 20px 24px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        .input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-group label {
            font-size: 12px;
            color: #64748b;
            font-weight: 500;
        }

        select, input {
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        select:focus, input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .message-input-row {
            display: flex;
            gap: 12px;
        }

        textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        button.secondary {
            background: #f1f5f9;
            color: #475569;
        }

        .welcome-message {
            text-align: center;
            color: #64748b;
            padding: 40px 20px;
        }

        .welcome-message h2 {
            color: #1e293b;
            margin-bottom: 12px;
        }

        .session-info {
            background: #f8fafc;
            padding: 12px 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #64748b;
        }

        .session-info span {
            font-weight: 500;
            color: #475569;
        }

        .loading {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            background: #94a3b8;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .result-banner {
            padding: 16px 20px;
            margin: 16px 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
        }

        .result-banner.success {
            background: #dcfce7;
            color: #166534;
        }

        .result-banner.failed {
            background: #fee2e2;
            color: #991b1b;
        }

        .translation {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid #e2e8f0;
            font-style: italic;
        }

        .simulation-panel {
            background: #f8fafc;
            padding: 12px 20px;
            border-top: 1px solid #e2e8f0;
            display: none;
        }

        .simulation-panel.active {
            display: block;
        }

        .simulation-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .simulation-row .input-group {
            flex: 1;
        }

        .simulation-row button {
            white-space: nowrap;
        }

        .simulation-result {
            margin-top: 12px;
            padding: 10px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 智能催收对话系统</h1>
            <div class="status">
                <div class="status-dot"></div>
                <span>在线</span>
            </div>
        </div>

        <div class="session-info" id="sessionInfo" style="display: none;">
            <div>会话ID: <span id="sessionId">-</span></div>
            <div>组别: <span id="chatGroup">-</span></div>
            <div>状态: <span id="currentState">-</span></div>
            <div style="display: flex; gap: 8px;">
                <button id="toggleSimulation" class="secondary" style="padding: 4px 12px; font-size: 12px;">仿真模式</button>
            </div>
        </div>

        <div class="simulation-panel" id="simulationPanel">
            <div class="simulation-row">
                <div class="input-group">
                    <label for="simPersona">客户类型</label>
                    <select id="simPersona">
                        <option value="cooperative">合作型</option>
                        <option value="busy">忙碌型</option>
                        <option value="negotiating">协商型</option>
                        <option value="resistant">抗拒型</option>
                        <option value="silent">沉默型</option>
                        <option value="forgetful">健忘型</option>
                        <option value="excuse_master">借口大师</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="simResistance">抗拒等级</label>
                    <select id="simResistance">
                        <option value="very_low">非常低</option>
                        <option value="low">低</option>
                        <option value="medium" selected>中等</option>
                        <option value="high">高</option>
                        <option value="very_high">非常高</option>
                    </select>
                </div>
                <button id="generateReply">生成客户回复</button>
            </div>
            <div class="simulation-result" id="simulationResult" style="display: none;">
                <strong>生成的回复:</strong> <span id="simResultText"></span>
                <button id="useSimReply" class="secondary" style="margin-left: 10px; padding: 4px 12px;">使用此回复</button>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="welcome-message" id="welcomeMessage">
                <h2>👋 欢迎使用智能催收对话系统</h2>
                <p>选择催收组别和客户姓名，然后开始对话</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-row">
                <div class="input-group">
                    <label for="chatGroup">催收组别</label>
                    <select id="chatGroup">
                        <option value="H2">H2 - 早期</option>
                        <option value="H1">H1 - 中期</option>
                        <option value="S0">S0 - 晚期</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="customerName">客户姓名</label>
                    <input type="text" id="customerName" placeholder="Pak / Bu" value="Pak Budi">
                </div>
            </div>
            <div class="message-input-row">
                <textarea id="messageInput" rows="2" placeholder="请先点击「开始对话」..." disabled></textarea>
                <button id="translateBtn" disabled title="翻译">📝</button>
                <button id="sendBtn" disabled>发送</button>
                <button id="newChatBtn">开始对话</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
