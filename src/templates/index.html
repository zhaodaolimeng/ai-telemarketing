<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能催收机器人 Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        .chat-bubble {
            max-width: 75%;
            word-wrap: break-word;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-blue-700 rounded-t-2xl shadow-lg p-6 text-white">
            <div class="flex items-center space-x-4">
                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center">
                    <span class="text-2xl">🤖</span>
                </div>
                <div>
                    <h1 class="text-2xl font-bold">智能催收机器人</h1>
                    <p class="text-blue-100 mt-1">印尼语 · H2阶段 · 逾期5天 · 欠款 Rp 500,000</p>
                </div>
            </div>
        </div>

        <!-- Chat Container -->
        <div class="bg-white rounded-b-2xl shadow-lg p-6">
            <!-- Chat Messages -->
            <div id="chat-container" class="h-[60vh] overflow-y-auto scrollbar-hide mb-6 space-y-4 p-4 bg-gray-50 rounded-xl">
                <!-- Bot First Message -->
                <div class="flex items-start space-x-3">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white flex-shrink-0 mt-1">
                        🤖
                    </div>
                    <div class="chat-bubble bg-white border border-gray-200 rounded-2xl rounded-tl-none px-4 py-3 shadow-sm">
                        <p class="text-gray-800">{{ first_response }}</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="flex space-x-3">
                <input
                    type="text"
                    id="user-input"
                    placeholder="Ketik pesan Anda disini..."
                    class="flex-1 px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                >
                <button
                    id="send-btn"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed"
                >
                    Kirim
                </button>
                <button
                    id="reset-btn"
                    class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-3 rounded-xl font-medium transition-colors"
                >
                    Reset
                </button>
            </div>

            <!-- Quick Reply Buttons -->
            <div class="mt-4 flex flex-wrap gap-2">
                <button class="quick-reply px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-colors">
                    Ya, betul ini saya
                </button>
                <button class="quick-reply px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-colors">
                    Saya akan bayar hari ini
                </button>
                <button class="quick-reply px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-colors">
                    Bisa diperpanjang?
                </button>
                <button class="quick-reply px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-colors">
                    Saya lagi tidak ada uang
                </button>
                <button class="quick-reply px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-colors">
                    Saya lagi sibuk, nanti ya
                </button>
                <button class="quick-reply px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-colors">
                    Salah nomor
                </button>
                <button class="quick-reply px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-colors">
                    Tagihannya berapa?
                </button>
                <button class="quick-reply px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-colors">
                    Kamu siapa?
                </button>
                <button class="quick-reply px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-colors">
                    Saya akan laporkan ke OJK
                </button>
            </div>
        </div>

        <!-- Info Section -->
        <div class="mt-6 bg-white rounded-xl shadow p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-3">📋 测试场景说明</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-gray-600">
                <div class="flex items-start space-x-2">
                    <span class="text-green-500 mt-0.5">✅</span>
                    <div>
                        <span class="font-medium">身份确认:</span> 用户确认是本人，机器人说明来意
                    </div>
                </div>
                <div class="flex items-start space-x-2">
                    <span class="text-green-500 mt-0.5">✅</span>
                    <div>
                        <span class="font-medium">正常还款:</span> 用户承诺还款时间，机器人确认并结束对话
                    </div>
                </div>
                <div class="flex items-start space-x-2">
                    <span class="text-green-500 mt-0.5">✅</span>
                    <div>
                        <span class="font-medium">展期请求:</span> 用户询问展期，机器人解释展期政策和费用
                    </div>
                </div>
                <div class="flex items-start space-x-2">
                    <span class="text-green-500 mt-0.5">✅</span>
                    <div>
                        <span class="font-medium">没钱场景:</span> 用户表示没钱，机器人提供展期方案
                    </div>
                </div>
                <div class="flex items-start space-x-2">
                    <span class="text-green-500 mt-0.5">✅</span>
                    <div>
                        <span class="font-medium">忙碌场景:</span> 用户表示现在忙，机器人回复稍后回电
                    </div>
                </div>
                <div class="flex items-start space-x-2">
                    <span class="text-green-500 mt-0.5">✅</span>
                    <div>
                        <span class="font-medium">错号场景:</span> 用户否认身份，机器人道歉并结束对话
                    </div>
                </div>
                <div class="flex items-start space-x-2">
                    <span class="text-green-500 mt-0.5">✅</span>
                    <div>
                        <span class="font-medium">身份质疑:</span> 用户质疑身份，机器人明确说明来意
                    </div>
                </div>
                <div class="flex items-start space-x-2">
                    <span class="text-green-500 mt-0.5">✅</span>
                    <div>
                        <span class="font-medium">用户威胁:</span> 用户威胁投诉，机器人保持专业道歉
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const resetBtn = document.getElementById('reset-btn');
        const quickReplies = document.querySelectorAll('.quick-reply');

        let conversationEnded = false;

        // 自动滚动到底部
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 添加消息到聊天窗口
        function addMessage(content, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = isUser
                ? 'flex items-start space-x-3 justify-end'
                : 'flex items-start space-x-3';

            if (isUser) {
                messageDiv.innerHTML = `
                    <div class="chat-bubble bg-blue-600 text-white rounded-2xl rounded-tr-none px-4 py-3 shadow-sm">
                        <p>${content}</p>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-gray-600 flex items-center justify-center text-white flex-shrink-0 mt-1">
                        👤
                    </div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white flex-shrink-0 mt-1">
                        🤖
                    </div>
                    <div class="chat-bubble bg-white border border-gray-200 rounded-2xl rounded-tl-none px-4 py-3 shadow-sm">
                        <p>${content}</p>
                    </div>
                `;
            }

            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        // 发送消息
        async function sendMessage(message) {
            if (conversationEnded) return;
            if (!message.trim()) return;

            addMessage(message, true);
            sendBtn.disabled = true;
            userInput.value = '';

            try {
                const response = await fetch('/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();

                if (response.ok) {
                    addMessage(data.response, false);
                    conversationEnded = data.ended;

                    if (conversationEnded) {
                        const endDiv = document.createElement('div');
                        endDiv.className = 'text-center text-gray-500 text-sm mt-4 py-3 bg-gray-100 rounded-lg';
                        endDiv.textContent = '🔴 对话已结束，点击 Reset 按钮重新开始';
                        chatContainer.appendChild(endDiv);
                        scrollToBottom();
                    }
                } else {
                    addMessage('⚠️ Terjadi kesalahan, silakan coba lagi.', false);
                }
            } catch (error) {
                addMessage('⚠️ Terjadi kesalahan jaringan, silakan coba lagi.', false);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // 重置对话
        async function resetChat() {
            try {
                const response = await fetch('/reset', { method: 'POST' });
                const data = await response.json();

                chatContainer.innerHTML = '';
                conversationEnded = false;

                // 添加机器人第一条消息
                addMessage(data.response, false);
            } catch (error) {
                alert('Gagal mereset percakapan');
            }
        }

        // 事件监听
        sendBtn.addEventListener('click', () => {
            sendMessage(userInput.value.trim());
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage(userInput.value.trim());
            }
        });

        resetBtn.addEventListener('click', resetChat);

        // 快捷回复按钮
        quickReplies.forEach(btn => {
            btn.addEventListener('click', () => {
                sendMessage(btn.textContent.trim());
            });
        });

        // 页面加载完成后滚动到底部
        window.addEventListener('load', scrollToBottom);
    </script>
</body>
</html>
